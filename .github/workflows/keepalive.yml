name: Keep Render Warm

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch: {}

concurrency:
  group: keepalive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping services
        env:
          KEEPALIVE_URL: ${{ vars.KEEPALIVE_URL }}
          KEEPALIVE_URLS: ${{ vars.KEEPALIVE_URLS }}
          KEEPALIVE_HEADER: ${{ secrets.KEEPALIVE_HEADER }}
        shell: bash
        run: |
          set -euo pipefail

          urls_raw="${KEEPALIVE_URLS:-${KEEPALIVE_URL:-}}"
          if [[ -z "${urls_raw}" ]]; then
            echo "Set KEEPALIVE_URLS or KEEPALIVE_URL as a repo variable."
            exit 1
          fi

          curl_args=(
            --silent
            --show-error
            --location
            --max-time 60
            --connect-timeout 15
            --retry 0
            --output /dev/null
            --write-out "%{http_code}"
          )
          if [[ -n "${KEEPALIVE_HEADER:-}" ]]; then
            curl_args+=(-H "${KEEPALIVE_HEADER}")
          fi

          # Collect valid URLs
          urls=()
          while IFS= read -r url; do
            url="${url//$'\r'/}"
            [[ -z "${url}" || "${url}" =~ ^[[:space:]]*# ]] && continue
            urls+=("${url}")
          done <<< "${urls_raw}"

          if [[ "${#urls[@]}" -eq 0 ]]; then
            echo "No valid URLs found."
            exit 1
          fi

          # Ping all URLs in parallel
          tmpdir="$(mktemp -d)"
          pids=()
          for i in "${!urls[@]}"; do
            url="${urls[$i]}"
            (
              code="$(curl "${curl_args[@]}" "${url}")" || code="000"
              echo "${url} -> HTTP ${code}"
              [[ "${code}" -ge 200 && "${code}" -lt 400 ]] 2>/dev/null || exit 1
            ) >"${tmpdir}/${i}.out" 2>&1 &
            pids+=($!)
          done

          # Collect results in submission order
          failures=0
          for i in "${!pids[@]}"; do
            wait "${pids[$i]}" || failures=$((failures + 1))
            cat "${tmpdir}/${i}.out"
          done

          count="${#urls[@]}"
          if [[ "${failures}" -gt 0 ]]; then
            echo "${failures}/${count} pings failed."
            exit 1
          fi
          echo "All ${count}/${count} pings succeeded."
